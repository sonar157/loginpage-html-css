<!DOCTYPE html>
<html>
    <head>
        <title>
            LOGIN
        </title>
        <style>
            
            body{
                background-color:grey;
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
            }
            
            .layout{
                background-color: white;
                width:300px;
                padding:20px;
                border-radius:10px;
            }
            
            input{
                width:100%;
                box-sizing:border-box;
                padding:10px;
                border:1px solid #ccc;
                border-radius: 5px;
                margin-top:10px;
            }

            button{
                width:100%;
                padding:10px;
                margin-top:15px;
                background-color:#4CAF50;
                border-radius: 5px;
                color:white;
                border:none;
                cursor:pointer;
                transition:all  0.2s ease;
            }

            h2{
                text-align:center;
            }

            button:hover{
                background-color:#45a049;
            }

            button:active{
                color:#4CAF50;
                background-color:white;
            }
        </style>
    </head>
    <body>
        <div class="layout">
            <h2>LOGIN</h2>
            <input type="email" placeholder="Enter your email">
            <input type="password" placeholder="Enter your password">
            <button>
                login
            </button>
        </div>
    </body>
</html>
